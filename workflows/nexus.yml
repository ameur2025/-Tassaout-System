name: Tassaout Nexus Engine
on: 
  push:
    paths:
      - 'listings/*.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate Ad
        run: |
          mkdir -p output
          rm -f output/*
          for file in listings/*.yml; do
            if [ -f "$file" ]; then
              filename=$(basename "$file" .yml)
              echo "--- إعلان رسمي ---" > "output/${filename}_ad.txt"
              cat "$file" >> "output/${filename}_ad.txt"
            fi
          done
      - name: Auto-Commit Results
        run: |
          git config --global user.name "Nexus Bot"
          git config --global user.email "bot@nexus.com"
          git add output/
          git commit -m "Nexus: Automated Processing" || echo "No changes"
          git push
