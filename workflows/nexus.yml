name: Tassaout Nexus Engine
on: [push]
permissions:
  contents: write

jobs:
  processor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Smart Update
        run: |
          # التأكد من وجود المجلد
          mkdir -p output
          
          # استبدال الإعلان القديم (Overwrite)
          for file in listings/*.yml; do
            if [ -f "$file" ]; then
              echo "--- تحديث الإعلان ---" > output/ad_ready.txt
              cat "$file" >> output/ad_ready.txt
            fi
          done

      - name: Auto-Save
        run: |
          git config --global user.name "Nexus Bot"
          git config --global user.email "bot@nexus.com"
          git add output/
          # استخدام --allow-empty لتجنب الأخطاء إذا لم يكن هناك تغيير
          git commit -m "Nexus: Smart Update" || echo "No changes"
          git push
