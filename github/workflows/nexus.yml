name: Tassaout Autonomous Nexus - بيت الحكمة
on:
  issues:
    types: [opened, edited]

jobs:
  brain:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Nexus Intelligence Processor
        run: |
          # استخراج عنوان الطلب من الـ Issue
          ISSUE_TITLE="${{ github.event.issue.title }}"
          echo "تم استلام طلب جديد: $ISSUE_TITLE"
          
          # إعداد ملف المخرجات
          mkdir -p output
          
          # منطق بيت الحكمة
          if [[ "$ISSUE_TITLE" == *"7"* ]]; then
             echo "جاري الدخول إلى بيت الحكمة لتحليل: $ISSUE_TITLE" > output/wisdom.txt
             # يمكنك إضافة أوامر التنقيب هنا
          else
             echo "تم استلام الطلب: $ISSUE_TITLE" > output/status.txt
          fi

      - name: Commit Results
        run: |
          git config --global user.name "Nexus Agent"
          git config --global user.email "agent@tassaout.system"
          git add output/
          git commit -m "Nexus Agent: Processed $ISSUE_TITLE" || echo "لا تغييرات"
          git push
