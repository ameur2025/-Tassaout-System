name: Tassaout Command Center
on:
  push:
    paths:
      - 'COMMAND.txt' # البوت لا يتحرك إلا إذا لمست هذا الملف!

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Process Order
        run: |
          echo "جاري تنفيذ الأمر من بيت الحكمة..."
          cat COMMAND.txt > output/log.txt
          # هنا تضع الأوامر التي تريدها
