name: Tassaout Factory Quality Control

on: 
  push:
    branches: [ main ]

jobs:
  agent-check:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Code Intelligence Scan
        run: |
          echo "بدء فحص ذكاء الكود..."
          
          if [ ! -f "index.html" ]; then
            echo "خطأ: الملف الأساسي مفقود!"
            exit 1
          fi
          
          echo "الفحص اكتمل: المصنع البرمجي في حالة سليمة."
