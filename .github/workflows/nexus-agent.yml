name: Nexus AI Agent
on:
  issue_comment:
    types: [created]

jobs:
  agent-exec:
    if: contains(github.event.comment.body, '@Nexus-Agent')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v3
      - name: Nexus Intelligence Logic
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          USER_REQUEST: ${{ github.event.comment.body }}
        run: |
          pip install google-generativeai
          python3 -c "
import os, google.generativeai as genai
genai.configure(api_key=os.environ['GEMINI_API_KEY'])
model = genai.GenerativeModel('gemini-pro')
request = os.environ['USER_REQUEST']
response = model.generate_content('You are an expert developer. Create/Update files based on: ' + request)
# هنا سيقوم الوكيل بكتابة النتائج في ملف خاص لتتمكن من مراجعته
with open('nexus_output.md', 'w') as f:
    f.write(response.text)
"
      - name: Push Updates
        run: |
          git config user.name 'Nexus-Agent'
          git config user.email 'nexus@agent.com'
          git add .
          git commit -m 'Nexus Agent: Automated update'
          git push
