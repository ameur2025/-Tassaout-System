name: Tassaout Industrial Agent
on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: write

jobs:
  agent-processor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Process Command
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="${{ github.event.issue.title }}"
          ISSUE_NUM="${{ github.event.issue.number }}"
          
          # 1. بروتوكول إنشاء المساعدين (Gems)
          if [[ "$TITLE" == *"[CREATE_GEM]"* ]]; then
            GEM_NAME=$(echo $TITLE | cut -d':' -f2)
            mkdir -p gems/$GEM_NAME
            echo "Role: Assistant for $GEM_NAME" > gems/$GEM_NAME/instructions.md
            gh issue comment $ISSUE_NUM --body "Manager: Gem ($GEM_NAME) created successfully."
            gh issue close $ISSUE_NUM
            
          # 2. بروتوكول التنظيف الشامل
          elif [[ "$TITLE" == *"[CLEAN_ALL]"* ]]; then
            # إغلاق جميع الـ Issues المفتوحة عدا الحالية
            gh issue list --state open --json number -q '.[].number' | grep -v "$ISSUE_NUM" | xargs -I {} gh issue close {} --comment "Manager: Office cleaned."
            gh issue comment $ISSUE_NUM --body "Manager: Office is now clean and organized."
            gh issue close $ISSUE_NUM
          fi
