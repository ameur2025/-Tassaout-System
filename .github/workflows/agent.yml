name: Tassaout Industrial Agent
on:
  issues:
    types: [opened]

jobs:
  agent-processor:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Execute
        run: |
          TITLE="${{ github.event.issue.title }}"
          if [[ "$TITLE" == *"[CLEAN]"* ]]; then
            gh issue comment ${{ github.event.issue.number }} --body "تم التنفيذ يا سيدي."
            gh issue close ${{ github.event.issue.number }}
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
