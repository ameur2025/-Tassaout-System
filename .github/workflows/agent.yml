name: Tassaout Industrial Agent
on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  agent-processor:
    runs-on: ubuntu-latest
    steps:
      - name: Process Command
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="${{ github.event.issue.title }}"
          if [[ "$TITLE" == *"[CLEAN]"* ]]; then
            gh issue comment ${{ github.event.issue.number }} --body "Agent opérationnel : Nettoyage en cours..."
            gh issue close ${{ github.event.issue.number }} --reason "completed"
          fi
