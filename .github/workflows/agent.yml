name: Tassaout Industrial Agent
on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: write

jobs:
  agent-processor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Process Command
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. قراءة الدستور من ملف المدير
          echo "المدير يقرأ الدستور..."
          cat manager_core.yml
          
          # 2. تحديد المتغيرات
          TITLE="${{ github.event.issue.title }}"
          ISSUE_NUM="${{ github.event.issue.number }}"
          
          # 3. بروتوكول التعيين الذاتي (إنشاء Gems)
          if [[ "$TITLE" == *"[CREATE_GEM]"* ]]; then
            GEM_NAME=$(echo $TITLE | cut -d':' -f2)
            mkdir -p gems/$GEM_NAME
            # إضافة ملف تعليمات بدائي للـ Gem الجديد
            echo "Role: Assistant for $GEM_NAME" > gems/$GEM_NAME/instructions.md
            
            # تأكيد الإنجاز
            gh issue comment $ISSUE_NUM --body "المدير: تم إنشاء الـ Gem المسمى ($GEM_NAME) بنجاح. أنا الآن المسؤول عن توجيهه."
            gh issue close $ISSUE_NUM
          fi
