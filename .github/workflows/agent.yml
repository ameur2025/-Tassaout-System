name: Tassaout Industrial Agent
on:
  issues:
    types: [opened]

jobs:
  agent-processor:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Process Command
        run: |
          TITLE="${{ github.event.issue.title }}"
          if [[ "$TITLE" == *"[CLEAN]"* ]]; then
            gh issue comment ${{ github.event.issue.number }} --body "جاري تنفيذ أمر التنظيف... تم بنجاح."
            gh issue close ${{ github.event.issue.number }}
          else
            gh issue comment ${{ github.event.issue.number }} --body "أمر غير معروف."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
