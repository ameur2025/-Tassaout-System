name: DANA - System Writer
on:
  push:
    paths:
      - 'User.txt'

jobs:
  DANA_Intelligence:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      
      - name: DANA Executes with Gemini
        run: |
          REQUEST=$(cat User.txt)
          echo "DANA يتصل بـ Gemini لمعالجة: $REQUEST"
          mkdir -p output
          # هنا سنضع كود الاستعلام من Gemini
          # ملاحظة: تأكد أنك خزنت GEMINI_API_KEY في Secrets
          echo "النتيجة: [هنا سيظهر تحليل Gemini]" > output/status.txt
          
      - name: Commit Action
        run: |
          git config user.name "DANA - System Writer"
          git config user.email "dana@tassaout.system"
          git add output/status.txt
          git commit -m "DANA: Intelligence processed"
          git push
