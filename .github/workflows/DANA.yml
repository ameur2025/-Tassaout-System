name: DANA - System Writer
on:
  push:
    paths:
      - 'User.txt'

jobs:
  DANA_Process:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: DANA Intelligence Execution
        run: |
          # 1. قراءة أمر المشرف العام
          ORDER=$(cat User.txt)
          
          # 2. قراءة محتوى ملف المرجع (Créer un gems)
          CONTENT=$(cat "Créer un gems")
          
          # 3. معالجة الطلب (دمج الأمر مع المحتوى)
          mkdir -p output
          echo "DANA يُنفذ الأمر: $ORDER" > output/status.txt
          echo "--- المرجع المستخدم ---" >> output/status.txt
          echo "$CONTENT" >> output/status.txt
          echo "-----------------------" >> output/status.txt
          echo "النتيجة: تم دمج المرجع في العملية بنجاح." >> output/status.txt
          
      - name: Finalizing Commit
        run: |
          git config user.name "DANA - System Writer"
          git config user.email "dana@tassaout.system"
          git add output/status.txt
          git commit -m "DANA: Executed order using references"
          git push
