name: DANA - System Writer
on:
  push:
    paths:
      - 'User.txt'

jobs:
  DANA_Intelligence:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Process with Gemini
        run: |
          REQUEST=$(cat User.txt)
          # الاتصال بـ Gemini
          RESPONSE=$(curl -s "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$GEMINI_API_KEY" \
            -H 'Content-Type: application/json' \
            -X POST \
            -d "{ \"contents\": [{ \"parts\": [{ \"text\": \"$REQUEST\" }] }] }")
          
          # تنظيف النتيجة وحفظها
          echo "$RESPONSE" > response.json
          mkdir -p output
          echo "طلب المشرف عامر: $REQUEST" > output/status.txt
          echo "--- رد DANA (Gemini) ---" >> output/status.txt
          echo "$RESPONSE" | grep -o '"text": "[^"]*' | cut -d'"' -f4 >> output/status.txt
          
      - name: Commit Result
        run: |
          git config user.name "DANA - System Writer"
          git config user.email "dana@tassaout.system"
          git add output/status.txt
          git commit -m "DANA: Gemini request completed"
          git push
