name: Tassaout Factory Smart Guard

on:
  push:
    branches: [ main ]

jobs:
  smart-check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: System Integrity Check
        run: |
          if [ ! -f "index.html" ]; then
            gh issue create --title "تنبيه: خلل في نظام Tassaout" --body "حارس الجودة يبلغكم: ملف index.html مفقود في المجلد الرئيسي. يرجى الإصلاح فوراً."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
