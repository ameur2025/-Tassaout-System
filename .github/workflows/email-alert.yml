name: Tassaout Agency Notifications
on: [push]

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Send Mail via Brevo API
        env:
          BREVO_API_KEY: ${{ secrets.EMAIL_PASS }}
        run: |
          curl -X POST https://api.brevo.com/v3/smtp/email \
            -H "accept: application/json" \
            -H "api-key: $BREVO_API_KEY" \
            -H "content-type: application/json" \
            -d '{
              "sender": {"email": "marocinvest2012@gmail.com", "name": "Tassaout Agency"},
              "to": [{"email": "marocinvest2012@gmail.com", "name": "Receiver"}],
              "subject": "نظام Alpha Core: نجاح الاتصال النهائي",
              "htmlContent": "<html><body><h1>سيدي الرئيس</h1><p>تم الإرسال بنجاح تام عبر Brevo API!</p></body></html>"
            }'
