name: Tassaout-Alert-System
on: [push]

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Send Mail
        uses: dawiddr/action-send-mail@v3.1.0
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "تقرير عمليات: Alpha Core Nexus"
          body: "سيدي الرئيس، تم تفعيل النظام وتأكيد الاتصال بنجاح."
          to: marocinvest2012@gmail.com
          from: Tassaout-System <${{ secrets.EMAIL_USER }}>
