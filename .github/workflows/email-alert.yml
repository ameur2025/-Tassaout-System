name: Tassaout Agency Notifications

on:
  push:
    branches:
      - main  # سيتم الإرسال عند أي تحديث في الفرع الرئيسي

jobs:
  send-email-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Send Email via Gmail
        uses: dawiddr/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "تنبيه تقني: تحديث في مستودع وكالة تساوت"
          body: |
            تم اكتشاف تغيير جديد في مستودع الوكالة.
            تم دفع (Push) كود جديد بواسطة المطور.
            يرجى مراجعة التغييرات لضمان سير العمل.
          to: marocinvest2012@gmail.com
          from: Tassaout IT Manager <${{ secrets.EMAIL_USER }}>
