name: Tassaout Agency Marketing Broadcast
on: [push]

jobs:
  broadcast-offer:
    runs-on: ubuntu-latest
    steps:
      - name: Send Email via Brevo
        env:
          BREVO_API_KEY: ${{ secrets.EMAIL_PASS }}
        run: |
          curl -X POST https://api.brevo.com/v3/smtp/email \
            -H "api-key: $BREVO_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "sender": {"name": "Tassaout Agency", "email": "marocinvest2012@gmail.com"},
              "to": [{"email": "marocinvest2012@gmail.com"}],
              "subject": "🔵 عرض عقاري حصري: حي الريحان",
              "htmlContent": "<h1>عروض حي الريحان</h1><p>تم تفعيل النظام بنجاح.</p>"
            }'
