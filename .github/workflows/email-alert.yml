name: Tassaout Agency Notifications
on: [push]

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Send Mail
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: |
          npm install nodemailer
          node -e "
            const nodemailer = require('nodemailer');
            const transporter = nodemailer.createTransport({
              host: 'smtp.gmail.com',
              port: 587,
              secure: false, 
              auth: {
                user: process.env.EMAIL_USER,
                pass: process.env.EMAIL_PASS
              },
              tls: {
                rejectUnauthorized: false
              }
            });
            
            transporter.sendMail({
              from: process.env.EMAIL_USER,
              to: 'marocinvest2012@gmail.com',
              subject: 'اختبار نظام Tassaout - تحديث 587',
              text: 'رسالة اختبار عبر المنفذ 587.'
            }, (err, info) => {
              if (err) {
                console.error('الخطأ النهائي:', err);
                process.exit(1);
              }
              console.log('نجاح الإرسال:', info.response);
            });
          "
