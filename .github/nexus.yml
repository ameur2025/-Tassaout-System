name: Tassaout Nexus Engine
on: [push]
permissions:
  contents: write

jobs:
  processor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Process Listings
        run: |
          mkdir -p output
          for file in listings/*.yml; do
            if [ -f "$file" ]; then
              echo "--- إعلان جديد ---" > output/ad_ready.txt
              cat "$file" >> output/ad_ready.txt
            fi
          done
      - name: Auto-Commit
        run: |
          git config --global user.name "Nexus Bot"
          git config --global user.email "bot@nexus.com"
          git add output/
          git commit -m "Nexus: Automated Update" || echo "No changes"
          git push
